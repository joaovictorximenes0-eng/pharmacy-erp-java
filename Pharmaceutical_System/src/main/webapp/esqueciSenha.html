<!DOCTYPE html>
<html>

    <meta charset="UTF-8">
    <title>Recuperar Senha</title>
    <link rel="stylesheet" type="text/css" href="css/style.css">
</head>
<body>
    <h2>Esqueci minha senha</h2>
    
    <form action="EsqueciSenhaServlet" method="POST">

    </form>
    
    <br>
    <a href="index.html" class="btn">Voltar</a>
</body>
